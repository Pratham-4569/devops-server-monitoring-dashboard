# Lightweight CI: install backend deps and verify the Flask app starts.
name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall app

      - name: Validate Flask app startup
        run: |
          python -c "
          from app import create_app

          app = create_app()
          client = app.test_client()
          response = client.get('/api/health')

          assert response.status_code == 200, f'Expected 200, got {response.status_code}'
          body = response.get_json()
          assert body and body.get('status') == 'ok', f'Unexpected body: {body}'

          print('Flask app started successfully; /api/health OK')
          "
