services:
  api:
    build: ./backend
    env_file: .env
    expose:
      - "5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitor-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build: ./nginx
    ports:
      - "${WEB_PORT:-3000}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - monitor-net
    restart: unless-stopped

networks:
  monitor-net:
    driver: bridge
